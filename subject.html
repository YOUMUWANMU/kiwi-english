<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>学科英语 · Kiwi English</title>
<script src="auth.js"></script>
<style>
  :root {
    --kiwi: #3d7a3a; --kiwi-light: #e8f5e8; --kiwi-dark: #2a5528;
    --purple: #7d5fa8; --purple-light: #f0e8fb;
    --bg: #f7f8f5; --surface: #ffffff;
    --text: #1a1f17; --text-2: #4a5245; --text-3: #7a8475;
    --border: #dde3d8; --radius: 12px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:60px; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:20; }
  .back-btn { background:transparent; border:none; color:var(--text-2); font-size:18px; cursor:pointer; padding:4px 8px; text-decoration:none; }
  .topbar-title { font-size:15px; font-weight:600; color:var(--kiwi-dark); flex:1; }
  .content { max-width:560px; margin:0 auto; padding:30px 20px; }
  .hint-card { background:var(--purple-light); border:1px solid #d4c2eb; border-radius:var(--radius); padding:18px; margin-bottom:16px; font-size:13px; color:var(--text-2); line-height:1.6; }
  .module-list { display:flex; flex-direction:column; gap:10px; }
  .mod-row { display:flex; align-items:center; gap:14px; padding:16px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
  .mod-icon { width:42px; height:42px; border-radius:10px; background:var(--purple-light); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .mod-info { flex:1; }
  .mod-name { font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; }
  .mod-desc { font-size:12px; color:var(--text-3); }
  .mod-tag { font-size:11px; padding:3px 8px; border-radius:10px; }
  .tag-soon { background:var(--bg); color:var(--text-3); border:1px solid var(--border); }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">←</a>
  <div class="topbar-title">📚 学科英语</div>
</div>

<div class="content">
  <div class="hint-card">
    各学科专用词汇与课堂用语，分模块按需开放。当前正在补充内容素材。
  </div>

  <div class="module-list">
    <div class="mod-row">
      <div class="mod-icon">⚽</div>
      <div class="mod-info">
        <div class="mod-name">体育课英语</div>
        <div class="mod-desc">PE 课指令、运动规则、橄榄球术语</div>
      </div>
      <span class="mod-tag tag-soon">即将更新</span>
    </div>
    <div class="mod-row">
      <div class="mod-icon">🎨</div>
      <div class="mod-info">
        <div class="mod-name">美术课英语</div>
        <div class="mod-desc">工具、材料、技法相关词汇</div>
      </div>
      <span class="mod-tag tag-soon">即将更新</span>
    </div>
    <div class="mod-row">
      <div class="mod-icon">🎵</div>
      <div class="mod-info">
        <div class="mod-name">音乐课英语</div>
        <div class="mod-desc">乐器、节奏、合唱术语</div>
      </div>
      <span class="mod-tag tag-soon">即将更新</span>
    </div>
    <div class="mod-row">
      <div class="mod-icon">🔬</div>
      <div class="mod-info">
        <div class="mod-name">科学课英语</div>
        <div class="mod-desc">实验词汇、化学常用词、生物术语</div>
      </div>
      <span class="mod-tag tag-soon">阶段 4 解锁</span>
    </div>
    <div class="mod-row">
      <div class="mod-icon">📐</div>
      <div class="mod-info">
        <div class="mod-name">数学课英语</div>
        <div class="mod-desc">题目读法、运算、几何术语</div>
      </div>
      <span class="mod-tag tag-soon">阶段 4 解锁</span>
    </div>
  </div>
</div>

<script>
(async function init() {
  try { await KIWI.requireAuth('any'); } catch {}
})();
</script>
</body>
</html>
