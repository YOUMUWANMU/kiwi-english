<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写作批改 · Kiwi English</title>
<style>
  :root {
    --kiwi: #3d7a3a; --kiwi-light: #e8f5e8; --kiwi-dark: #2a5528;
    --gold: #c8820a; --gold-light: #fef3dc;
    --danger: #c0392b; --danger-light: #fde8e8;
    --bg: #f7f8f5; --surface: #ffffff;
    --text: #1a1f17; --text-2: #4a5245; --text-3: #7a8475;
    --border: #dde3d8; --radius: 12px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
  .back-btn { font-size:20px; text-decoration:none; color:var(--text-2); }
  .topbar-title { font-size:15px; font-weight:600; }
  .topbar-sub { font-size:12px; color:var(--text-3); }

  .content { max-width:680px; margin:0 auto; padding:16px; }

  .prompt-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  .prompt-label { font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; }
  .prompt-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .prompt-option { padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; cursor:pointer; transition:all 0.15s; background:var(--bg); color:var(--text-2); text-align:left; }
  .prompt-option:hover { border-color:var(--kiwi); color:var(--kiwi-dark); background:var(--kiwi-light); }
  .prompt-option.selected { border-color:var(--kiwi); background:var(--kiwi-light); color:var(--kiwi-dark); font-weight:500; }
  .prompt-icon { font-size:16px; margin-bottom:4px; display:block; }
  .prompt-title { font-weight:500; font-size:13px; }
  .prompt-desc { font-size:11px; color:var(--text-3); margin-top:2px; }

  .selected-prompt { background:var(--kiwi-dark); color:white; border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:14px; font-size:14px; line-height:1.5; display:none; }
  .selected-prompt.show { display:block; }
  .selected-prompt-label { font-size:11px; color:#9fd49c; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:6px; }

  .writing-area { position:relative; margin-bottom:14px; }
  .writing-textarea { width:100%; min-height:180px; border:1px solid var(--border); border-radius:var(--radius); padding:14px; font-size:14px; line-height:1.7; font-family:inherit; background:var(--surface); color:var(--text); resize:vertical; outline:none; transition:border-color 0.15s; }
  .writing-textarea:focus { border-color:var(--kiwi); }
  .writing-textarea::placeholder { color:var(--text-3); }
  .word-count { position:absolute; bottom:10px; right:12px; font-size:11px; color:var(--text-3); }

  .btn-submit { width:100%; padding:13px; background:var(--kiwi); color:white; border:none; border-radius:var(--radius-sm); font-size:15px; font-weight:500; cursor:pointer; transition:background 0.15s; }
  .btn-submit:hover { background:var(--kiwi-dark); }
  .btn-submit:disabled { background:var(--border); color:var(--text-3); cursor:not-allowed; }

  /* 结果区 */
  .result-section { display:none; margin-top:6px; }
  .result-section.show { display:block; }

  .score-banner { border-radius:var(--radius); padding:18px; margin-bottom:14px; display:flex; align-items:center; gap:16px; }
  .score-banner.excellent { background:#e8f5e8; border:1px solid #b8d9b6; }
  .score-banner.good { background:var(--gold-light); border:1px solid #f5d89a; }
  .score-banner.try-again { background:var(--danger-light); border:1px solid #f5c0b8; }

  .score-num { font-size:40px; font-weight:700; line-height:1; }
  .score-banner.excellent .score-num { color:var(--kiwi-dark); }
  .score-banner.good .score-num { color:#7a5a0a; }
  .score-banner.try-again .score-num { color:var(--danger); }

  .score-info { flex:1; }
  .score-label { font-size:12px; color:var(--text-3); }
  .score-overall { font-size:14px; font-weight:500; color:var(--text); margin-top:4px; }

  .result-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
  .result-card-header { padding:12px 16px; border-bottom:1px solid var(--border); font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
  .result-card-body { padding:14px 16px; }

  .correction-item { padding:10px; border-radius:var(--radius-sm); margin-bottom:8px; }
  .correction-item:last-child { margin-bottom:0; }
  .correction-item.grammar { background:#fde8e8; border-left:3px solid #e74c3c; }
  .correction-item.spelling { background:#fef3dc; border-left:3px solid #f39c12; }
  .correction-item.expression { background:#e8f0fb; border-left:3px solid #3498db; }
  .correction-original { font-size:13px; color:var(--danger); text-decoration:line-through; margin-bottom:3px; }
  .correction-fixed { font-size:13px; font-weight:500; color:var(--kiwi-dark); margin-bottom:4px; }
  .correction-why { font-size:12px; color:var(--text-2); }

  .highlight-item { display:flex; gap:8px; align-items:flex-start; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text-2); }
  .highlight-item:last-child { border-bottom:none; }
  .highlight-check { color:var(--kiwi); font-size:15px; flex-shrink:0; }

  .improved-text { font-size:14px; line-height:1.8; color:var(--text); background:var(--bg); padding:14px; border-radius:var(--radius-sm); white-space:pre-wrap; }

  .suggestion-box { background:var(--kiwi-light); border:1px solid #b8d9b6; border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; color:var(--kiwi-dark); display:flex; gap:10px; align-items:flex-start; }

  .btn-retry { width:100%; padding:11px; background:transparent; color:var(--kiwi); border:1px solid var(--kiwi); border-radius:var(--radius-sm); font-size:14px; cursor:pointer; margin-top:12px; transition:all 0.15s; }
  .btn-retry:hover { background:var(--kiwi-light); }

  .loading-mask { display:none; position:fixed; inset:0; background:rgba(247,248,245,0.85); z-index:50; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .loading-mask.show { display:flex; }
  .loading-text { font-size:14px; color:var(--text-2); }
  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--kiwi); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">←</a>
  <div>
    <div class="topbar-title">写作批改</div>
    <div class="topbar-sub">AI老师实时批改，帮你写出地道英语</div>
  </div>
</div>

<div class="content">

  <div class="prompt-card">
    <div class="prompt-label">选择写作题目</div>
    <div class="prompt-grid">
      <button class="prompt-option" onclick="selectPrompt(this, 0)">
        <span class="prompt-icon">🏫</span>
        <div class="prompt-title">给老师写邮件</div>
        <div class="prompt-desc">请假/问问题</div>
      </button>
      <button class="prompt-option" onclick="selectPrompt(this, 1)">
        <span class="prompt-icon">📝</span>
        <div class="prompt-title">介绍我自己</div>
        <div class="prompt-desc">写给新同学看</div>
      </button>
      <button class="prompt-option" onclick="selectPrompt(this, 2)">
        <span class="prompt-icon">🏉</span>
        <div class="prompt-title">我最喜欢的运动</div>
        <div class="prompt-desc">50-80词短文</div>
      </button>
      <button class="prompt-option" onclick="selectPrompt(this, 3)">
        <span class="prompt-icon">🌿</span>
        <div class="prompt-title">关于新西兰</div>
        <div class="prompt-desc">我的期待和想法</div>
      </button>
    </div>
  </div>

  <div class="selected-prompt" id="selected-prompt">
    <div class="selected-prompt-label">写作题目</div>
    <div id="prompt-text"></div>
  </div>

  <div class="writing-area">
    <textarea class="writing-textarea" id="essay" placeholder="在这里用英语写作...（至少20个词）" oninput="updateWordCount()"></textarea>
    <div class="word-count"><span id="word-count">0</span> 词</div>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitWriting()" disabled>
    ✏️ 提交批改
  </button>

  <!-- 结果 -->
  <div class="result-section" id="result-section">

    <div class="score-banner" id="score-banner">
      <div class="score-num" id="score-num">8</div>
      <div class="score-info">
        <div class="score-label">综合评分 / 10</div>
        <div class="score-overall" id="score-overall">写得很好！</div>
      </div>
    </div>

    <div class="result-card" id="corrections-card" style="display:none">
      <div class="result-card-header">🔍 需要修改的地方</div>
      <div class="result-card-body" id="corrections-body"></div>
    </div>

    <div class="result-card">
      <div class="result-card-header">⭐ 做得好的地方</div>
      <div class="result-card-body" id="highlights-body"></div>
    </div>

    <div class="result-card">
      <div class="result-card-header">✨ 修改后的版本</div>
      <div class="result-card-body">
        <div class="improved-text" id="improved-text"></div>
      </div>
    </div>

    <div class="suggestion-box" id="suggestion-box">
      <span style="font-size:16px;flex-shrink:0">💡</span>
      <span id="suggestion-text"></span>
    </div>

    <button class="btn-retry" onclick="resetWriting()">重新写一篇 →</button>

  </div>

</div>

<div class="loading-mask" id="loading-mask">
  <div class="spinner"></div>
  <div class="loading-text">AI老师正在批改你的作文...</div>
</div>

<script>
const WORKER_URL = '';

const PROMPTS = [
  {
    label: '给老师写邮件（请假/问问题）',
    text: 'Write a short email to your teacher, Ms. Johnson. You were absent yesterday because you were sick. Apologise and ask what you missed in class. (About 40-60 words)',
    zh: '给你的老师Ms. Johnson写一封简短的邮件。你昨天因为生病缺课了。道歉并询问你错过了什么课程内容。（约40-60词）'
  },
  {
    label: '介绍我自己',
    text: 'Write a short introduction about yourself for your new classmates at a New Zealand school. Include your name, where you\'re from, your hobbies, and one thing you\'re excited about. (About 50-70 words)',
    zh: '为你在新西兰学校的新同学写一段简短的自我介绍。包括你的名字、你来自哪里、你的爱好，以及一件你期待的事情。（约50-70词）'
  },
  {
    label: '我最喜欢的运动',
    text: 'Write about your favourite sport or physical activity. What is it? Why do you enjoy it? How often do you do it? (About 50-80 words)',
    zh: '写一写你最喜欢的运动或体育活动。是什么？你为什么喜欢它？你多久做一次？（约50-80词）'
  },
  {
    label: '关于新西兰——我的期待',
    text: 'You are going to study in New Zealand soon. Write about what you are excited about and what you are a little nervous about. (About 50-80 words)',
    zh: '你即将去新西兰读书。写一写你期待什么，以及你有一点点紧张的是什么。（约50-80词）'
  }
];

let selectedPromptIndex = -1;

function selectPrompt(btn, index) {
  document.querySelectorAll('.prompt-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedPromptIndex = index;
  const p = PROMPTS[index];
  document.getElementById('prompt-text').innerHTML = `<strong>${p.label}</strong><br><span style="font-size:13px;opacity:0.85;line-height:1.6;display:block;margin-top:6px">${p.text}</span><span style="font-size:12px;opacity:0.65;display:block;margin-top:4px">${p.zh}</span>`;
  document.getElementById('selected-prompt').classList.add('show');
  document.getElementById('essay').placeholder = '在这里用英语写作...\n\n提示：不要用翻译软件，用你自己知道的英语写，写错了没关系，AI老师会帮你改！';
  checkSubmitReady();
  document.getElementById('result-section').classList.remove('show');
}

function updateWordCount() {
  const text = document.getElementById('essay').value.trim();
  const count = text ? text.split(/\s+/).filter(w => w).length : 0;
  document.getElementById('word-count').textContent = count;
  checkSubmitReady();
}

function checkSubmitReady() {
  const text = document.getElementById('essay').value.trim();
  const count = text ? text.split(/\s+/).filter(w => w).length : 0;
  document.getElementById('submit-btn').disabled = selectedPromptIndex < 0 || count < 10;
}

async function submitWriting() {
  const essay = document.getElementById('essay').value.trim();
  const prompt = PROMPTS[selectedPromptIndex];
  document.getElementById('loading-mask').classList.add('show');
  document.getElementById('result-section').classList.remove('show');

  if (!WORKER_URL) {
    await new Promise(r => setTimeout(r, 1800));
    document.getElementById('loading-mask').classList.remove('show');
    showDemoResult(essay);
    return;
  }

  try {
    const res = await fetch(`${WORKER_URL}/api/writing`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ essay, prompt: prompt.text, level: 1 })
    });
    const data = await res.json();
    document.getElementById('loading-mask').classList.remove('show');
    showResult(data);
  } catch (e) {
    document.getElementById('loading-mask').classList.remove('show');
    showDemoResult(essay);
  }
}

function showDemoResult(essay) {
  const wordCount = essay.split(/\s+/).filter(w => w).length;
  const score = Math.min(9, Math.max(5, Math.floor(wordCount / 8) + 5));
  const demo = {
    score,
    overall: score >= 8 ? '写得非常棒！用词准确，句子结构清晰。' : score >= 6 ? '写得不错！有一些小地方可以改进。' : '有好的开始！继续练习会越来越好。',
    corrections: [
      { original: 'I is very happy', corrected: 'I am very happy', explanation: 'be动词用法：I后面跟am，不是is', type: 'grammar' },
      { original: 'go to school everyday', corrected: 'go to school every day', explanation: '"every day"（每天）是两个词，不连写', type: 'spelling' }
    ],
    highlights: ['能完整表达自己的想法，很好！', '使用了一些连接词，让文章更流畅'],
    suggestion: '尝试在句子中加入更多细节，比如时间、地点或原因，会让文章更生动。',
    improved_version: essay.replace(/I is/g, 'I am').replace(/everyday/g, 'every day')
  };
  showResult(demo);
}

function showResult(data) {
  const score = data.score || 7;
  const banner = document.getElementById('score-banner');
  banner.className = 'score-banner ' + (score >= 8 ? 'excellent' : score >= 6 ? 'good' : 'try-again');
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-overall').textContent = data.overall || '';

  const corrections = data.corrections || [];
  if (corrections.length > 0) {
    document.getElementById('corrections-card').style.display = '';
    document.getElementById('corrections-body').innerHTML = corrections.map(c => `
      <div class="correction-item ${c.type || 'grammar'}">
        <div class="correction-original">${escHtml(c.original)}</div>
        <div class="correction-fixed">→ ${escHtml(c.corrected)}</div>
        <div class="correction-why">${escHtml(c.explanation)}</div>
      </div>`).join('');
  } else {
    document.getElementById('corrections-card').style.display = 'none';
  }

  const highlights = data.highlights || [];
  document.getElementById('highlights-body').innerHTML = highlights.map(h =>
    `<div class="highlight-item"><span class="highlight-check">✓</span><span>${escHtml(h)}</span></div>`
  ).join('') || '<div class="highlight-item"><span class="highlight-check">✓</span><span>勇于用英语写作，这本身就很棒！</span></div>';

  document.getElementById('improved-text').textContent = data.improved_version || '';
  document.getElementById('suggestion-text').textContent = data.suggestion || '';

  document.getElementById('result-section').classList.add('show');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetWriting() {
  document.getElementById('essay').value = '';
  document.getElementById('word-count').textContent = '0';
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('submit-btn').disabled = true;
  document.querySelectorAll('.prompt-option').forEach(b => b.classList.remove('selected'));
  document.getElementById('selected-prompt').classList.remove('show');
  selectedPromptIndex = -1;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
